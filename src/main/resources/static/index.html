<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDocs — AI Document Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3347;
      --accent:      #5b7cf6;
      --accent-h:    #4a6ae0;
      --green:       #34c97d;
      --red:         #e05252;
      --text:        #e8eaf0;
      --text-muted:  #7a8099;
      --user-bubble: #2a3a6e;
      --ai-bubble:   #1e2235;
      --radius:      14px;
      --radius-sm:   8px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
    }

    .logo-icon svg { width: 18px; height: 18px; color: #fff; }

    .logo-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub   { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .port-control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .port-control input {
      width: 60px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }

    .port-control input:focus { border-color: var(--accent); }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.offline { background: var(--red); }

    .new-session-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }
    .new-session-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Layout ──────────────────────────────────── */
    .layout {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(91, 124, 246, .06);
    }

    .drop-zone svg { color: var(--text-muted); margin-bottom: 8px; }
    .drop-zone p   { font-size: 13px; color: var(--text-muted); }
    .drop-zone span { font-size: 11px; color: #555; display: block; margin-top: 4px; }

    /* File chip */
    .file-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(91, 124, 246, .1);
      border: 1px solid rgba(91, 124, 246, .3);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }

    .file-chip-info { flex: 1; min-width: 0; }
    .file-chip-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-chip-size { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }
    .clear-btn:hover { color: var(--red); }

    .hidden { display: none !important; }

    /* Upload button */
    .upload-btn {
      width: 100%;
      margin-top: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background .15s;
    }
    .upload-btn:hover:not(:disabled) { background: var(--accent-h); }
    .upload-btn:disabled { background: #2a2e40; color: var(--text-muted); cursor: not-allowed; }

    /* Status pill */
    .status-pill {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      line-height: 1.4;
    }
    .status-pill.success { background: rgba(52, 201, 125, .1); color: var(--green); border: 1px solid rgba(52,201,125,.25); }
    .status-pill.error   { background: rgba(224,82,82,.1); color: var(--red); border: 1px solid rgba(224,82,82,.25); }
    .status-pill.loading { background: rgba(91,124,246,.1); color: var(--accent); border: 1px solid rgba(91,124,246,.25); }

    /* Session info */
    .session-info {
      padding: 12px 16px;
      font-size: 11px;
      color: #444;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .session-info span { color: #555; word-break: break-all; }

    /* Doc list */
    .doc-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      margin-bottom: 6px;
      font-size: 12px;
    }
    .doc-item svg { color: var(--text-muted); flex-shrink: 0; }
    .doc-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-item-chunks { color: var(--text-muted); flex-shrink: 0; }

    /* ── Chat area ───────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .icon-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--surface2);
      display: grid;
      place-items: center;
    }
    .empty-state p { font-size: 15px; font-weight: 500; color: var(--text); }
    .empty-state span { font-size: 13px; }

    /* Message row */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .avatar.user { background: var(--accent); color: #fff; }
    .avatar.ai   { background: var(--surface2); color: var(--text-muted); }
    .avatar.ai svg { width: 16px; height: 16px; }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user  .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .msg-row.ai    .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .thinking-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    .dot-pulse {
      display: flex;
      gap: 4px;
    }
    .dot-pulse span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: .2s; }
    .dot-pulse span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Input bar ───────────────────────────────── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      align-self: flex-end;
      margin: 4px;
      transition: background .15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-h); }
    .send-btn:disabled { background: #2a2e40; cursor: not-allowed; }
    .send-btn svg { color: #fff; width: 16px; height: 16px; }

    .input-hint {
      font-size: 11px;
      color: #3a3f55;
      text-align: center;
      padding-bottom: 2px;
    }

    /* ── Scrollbars for sidebar ──────────────────── */
    .doc-list-wrap::-webkit-scrollbar { width: 4px; }
    .doc-list-wrap::-webkit-scrollbar-track { background: transparent; }
    .doc-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .messages { padding: 16px; }
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">SmartDocs</div>
        <div class="logo-sub">RAG-Powered Document Chat</div>
      </div>
    </div>
    <div class="header-right">
      <div class="port-control">
        <span>Port:</span>
        <input id="port-input" type="number" value="8081" onchange="updatePort(this.value)" />
      </div>
      <div class="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Checking...</span>
      </div>
      <button class="new-session-btn" onclick="newSession()">+ New Session</button>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- ══ Sidebar ══ -->
    <aside class="sidebar">

      <!-- Upload section -->
      <div class="sidebar-section">
        <div class="sidebar-label">Upload Document</div>

        <div id="drop-zone" class="drop-zone"
          onclick="document.getElementById('file-input').click()"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
          ondrop="handleDrop(event)">
          <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            style="margin: 0 auto 8px; display:block;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <p>Drop PDF here</p>
          <span>or click to browse</span>
          <input id="file-input" type="file" accept=".pdf" class="hidden" onchange="handleFileSelect(event)" />
        </div>

        <div id="file-chip" class="file-chip hidden" style="margin-top:10px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
          </svg>
          <div class="file-chip-info">
            <div class="file-chip-name" id="chip-name"></div>
            <div class="file-chip-size" id="chip-size"></div>
          </div>
          <button class="clear-btn" onclick="clearFile()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <button id="upload-btn" class="upload-btn" onclick="uploadFile()" disabled>
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          Ingest PDF
        </button>

        <div id="upload-status" class="hidden status-pill"></div>
      </div>

      <!-- Session info -->
      <div class="session-info" id="session-info-panel"></div>

      <!-- Doc history -->
      <div class="doc-list-wrap" id="doc-list-wrap" style="display:none;">
        <div class="sidebar-label" style="margin-bottom:8px;">
          Ingested Docs
          <button onclick="loadDocHistory()"
            style="float:right;background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;">
            Refresh
          </button>
        </div>
        <div id="doc-list"></div>
      </div>

    </aside>

    <!-- ══ Chat area ══ -->
    <div class="chat-area">

      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <div class="icon-ring">
            <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
          </div>
          <p>Ask me anything about your documents</p>
          <span>Upload a PDF in the sidebar, then start chatting</span>
        </div>
      </div>

      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="msg-input" rows="1"
            placeholder="Ask a question about your document..."
            onkeydown="handleKeydown(event)"
            oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>

    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────
    //  CONFIG
    // ─────────────────────────────────────────────────────
    let PORT     = 8081;
    let API_BASE = `http://localhost:${PORT}`;

    let sessionId    = null;
    let userId       = null;
    let selectedFile = null;
    let isLoading    = false;

    function updatePort(val) {
      PORT     = parseInt(val) || 8081;
      API_BASE = `http://localhost:${PORT}`;
      pingHealth();
    }

    // ─────────────────────────────────────────────────────
    //  SESSION  (persisted across page reloads)
    // ─────────────────────────────────────────────────────
    function initSession() {
      sessionId = localStorage.getItem('sessionId');
      userId    = localStorage.getItem('userId');

      if (!sessionId) {
        sessionId = crypto.randomUUID();
        localStorage.setItem('sessionId', sessionId);
      }
      if (!userId) {
        userId = 'user-' + crypto.randomUUID();
        localStorage.setItem('userId', userId);
      }

      renderSessionInfo();
    }

    function newSession() {
      if (!confirm('Start a new session? This will clear your current chat context.')) return;
      localStorage.removeItem('sessionId');
      localStorage.removeItem('userId');
      initSession();
      clearMessages();
    }

    function renderSessionInfo() {
      const panel = document.getElementById('session-info-panel');
      panel.innerHTML =
        `<div>Session: <span>${sessionId.slice(0,8)}…</span></div>` +
        `<div style="margin-top:2px;">User: <span>${userId.slice(0,14)}…</span></div>`;
    }

    // ─────────────────────────────────────────────────────
    //  HEALTH CHECK
    // ─────────────────────────────────────────────────────
    async function pingHealth() {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      try {
        const res = await fetch(`${API_BASE}/`, { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          dot.className  = 'status-dot online';
          text.textContent = 'API connected';
          loadDocHistory();
          return;
        }
      } catch { /* fall through */ }
      dot.className  = 'status-dot offline';
      text.textContent = `API offline — port ${PORT}`;
    }

    // ─────────────────────────────────────────────────────
    //  CHAT HISTORY  (GET /api/v1/chat/history?sessionId=)
    // ─────────────────────────────────────────────────────
    async function loadChatHistory() {
      try {
        const res = await fetch(
          `${API_BASE}/api/v1/chat/history?sessionId=${encodeURIComponent(sessionId)}`,
          { signal: AbortSignal.timeout(5000) }
        );
        if (!res.ok) return;
        const history = await res.json();
        if (!Array.isArray(history) || history.length === 0) return;

        clearMessages();
        history.forEach(msg => {
          const role = (msg.role || '').toUpperCase();
          renderMessage(role === 'USER' ? 'user' : 'ai', msg.content || '');
        });
      } catch { /* endpoint may not exist yet — fail silently */ }
    }

    // ─────────────────────────────────────────────────────
    //  SEND MESSAGE  (POST /api/v1/agent/chat)
    //  Backend expects: Headers x-session-id, x-user-id
    //                   Body: { "userQuery": "..." }
    //  Returns: plain String
    // ─────────────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      input.value = '';
      autoResize(input);
      document.getElementById('send-btn').disabled = true;

      // Render user message immediately
      renderMessage('user', text);

      // Show thinking indicator
      const thinkingId = showThinking();

      try {
        const res = await fetch(`${API_BASE}/api/v1/agent/chat`, {
          method: 'POST',
          headers: {
            'Content-Type':  'application/json',
            'x-session-id':  sessionId,
            'x-user-id':     userId,
          },
          body: JSON.stringify({ userQuery: text }),
        });

        removeThinking(thinkingId);

        if (res.ok) {
          const raw = await res.text();
          // Backend returns a plain String; handle JSON wrapper if present
          let answer = raw;
          if (raw.trim().startsWith('{')) {
            try {
              const data = JSON.parse(raw);
              answer = data.response ?? data.answer ?? data.content ?? raw;
            } catch { /* keep raw */ }
          }
          renderMessage('ai', answer || '(empty response)');
        } else {
          const body = await res.text().catch(() => '');
          renderMessage('ai', `Error ${res.status}: ${body || res.statusText}`);
        }
      } catch (e) {
        removeThinking(thinkingId);
        const msg = e.message?.toLowerCase() || '';
        if (msg.includes('failed to fetch') || msg.includes('load failed') || msg.includes('networkerror')) {
          renderMessage('ai', `Cannot reach the API on port ${PORT}. Is Spring Boot running?`);
        } else {
          renderMessage('ai', `Request failed: ${e.message}`);
        }
      } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('msg-input').focus();
      }
    }

    // ─────────────────────────────────────────────────────
    //  RENDER MESSAGE
    // ─────────────────────────────────────────────────────
    function renderMessage(role, text) {
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const container = document.getElementById('messages');

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const avatarHtml = role === 'user'
        ? `<div class="avatar user">U</div>`
        : `<div class="avatar ai">
             <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                 d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
             </svg>
           </div>`;

      row.innerHTML = `${avatarHtml}<div class="bubble">${escapeHtml(text)}</div>`;
      container.appendChild(row);
      scrollToBottom();
      return row;
    }

    function showThinking() {
      const container = document.getElementById('messages');
      const id = 'thinking-' + Date.now();

      const row = document.createElement('div');
      row.className = 'msg-row ai';
      row.id = id;
      row.innerHTML = `
        <div class="avatar ai">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
          </svg>
        </div>
        <div class="bubble">
          <div class="thinking-bubble">
            Thinking
            <div class="dot-pulse">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>`;
      container.appendChild(row);
      scrollToBottom();
      return id;
    }

    function removeThinking(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function clearMessages() {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      // re-add empty state
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'empty-state';
      empty.innerHTML = `
        <div class="icon-ring">
          <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
          </svg>
        </div>
        <p>Ask me anything about your documents</p>
        <span>Upload a PDF in the sidebar, then start chatting</span>`;
      container.appendChild(empty);
    }

    function scrollToBottom() {
      const c = document.getElementById('messages');
      c.scrollTop = c.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─────────────────────────────────────────────────────
    //  FILE UPLOAD  (POST /api/v1/ingest)
    // ─────────────────────────────────────────────────────
    function handleFileSelect(e) { if (e.target.files[0]) setFile(e.target.files[0]); }

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.add('dragover');
    }

    function handleDragLeave() {
      document.getElementById('drop-zone').classList.remove('dragover');
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f?.type === 'application/pdf') setFile(f);
      else showUploadStatus('error', 'Please drop a PDF file.');
    }

    function setFile(file) {
      selectedFile = file;
      document.getElementById('drop-zone').classList.add('hidden');
      document.getElementById('file-chip').classList.remove('hidden');
      document.getElementById('chip-name').textContent = file.name;
      document.getElementById('chip-size').textContent = fmtBytes(file.size);
      document.getElementById('upload-btn').disabled = false;
      document.getElementById('upload-status').classList.add('hidden');
    }

    function clearFile() {
      selectedFile = null;
      document.getElementById('file-chip').classList.add('hidden');
      document.getElementById('drop-zone').classList.remove('hidden');
      document.getElementById('file-input').value = '';
      document.getElementById('upload-btn').disabled = true;
      document.getElementById('upload-status').classList.add('hidden');
    }

    function fmtBytes(b) {
      if (b < 1024)    return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    async function uploadFile() {
      if (!selectedFile) return;
      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'Ingesting…';
      showUploadStatus('loading', 'Uploading and processing PDF…');

      const fd = new FormData();
      fd.append('file', selectedFile);

      try {
        const res  = await fetch(`${API_BASE}/api/v1/ingest`, { method: 'POST', body: fd });
        const body = await res.text();

        if (res.ok) {
          let chunks = '?';
          try {
            const data = JSON.parse(body);
            chunks = data.chunksStored ?? data.chunkCount ?? data.chunks ?? chunks;
          } catch {
            const m = body.match(/\d+/);
            if (m) chunks = m[0];
          }
          showUploadStatus('success', `Ingested ${chunks} chunks from "${selectedFile.name}"`);
          clearFile();
          loadDocHistory();
        } else {
          showUploadStatus('error', `Server error ${res.status}: ${body || 'no details'}`);
          btn.disabled = false;
        }
      } catch (e) {
        showUploadStatus('error', `Upload failed: ${e.message}`);
        btn.disabled = false;
      } finally {
        btn.textContent = 'Ingest PDF';
        if (!selectedFile) btn.disabled = true;
      }
    }

    function showUploadStatus(type, msg) {
      const el = document.getElementById('upload-status');
      el.className = `status-pill ${type}`;
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    // ─────────────────────────────────────────────────────
    //  DOCUMENT HISTORY  (GET /api/v1/documents)
    // ─────────────────────────────────────────────────────
    async function loadDocHistory() {
      try {
        const res = await fetch(`${API_BASE}/api/v1/documents`,
          { signal: AbortSignal.timeout(3000) });
        if (!res.ok) return;
        const docs = await res.json();
        if (!Array.isArray(docs) || docs.length === 0) return;

        const wrap = document.getElementById('doc-list-wrap');
        wrap.style.display = 'block';
        document.getElementById('doc-list').innerHTML = docs.slice(0, 15).map(d => `
          <div class="doc-item">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="doc-item-name">${escapeHtml(d.filename ?? d.name ?? 'Document')}</span>
            <span class="doc-item-chunks">${d.chunkSize ?? d.chunkCount ?? d.chunksStored ?? '?'}c</span>
          </div>`).join('');
      } catch { /* endpoint not built yet */ }
    }

    // ─────────────────────────────────────────────────────
    //  INPUT HELPERS
    // ─────────────────────────────────────────────────────
    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ─────────────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────────────
    initSession();
    pingHealth();
    loadChatHistory();
    setInterval(pingHealth, 15000);
  </script>
</body>
</html>
